              status = body.get('status') or '未知'
              items = body.get('items') or []
              items_text = '、'.join(str(i) for i in items) if isinstance(items, list) and items else '暂无商品信息'
              carrier = body.get('carrier') or '暂无'
              tracking_no = body.get('tracking_no') or '暂无'
              refund_status = body.get('refund_status') or '暂无'
              latest_progress = body.get('latest_progress') or '暂无'

              if ('为什么' in query and '订单' in query and ('还要' in query or '已经查到' in query)) or ('你不是有订单' in query) or ('你不是已经查到我订单了吗' in query) or ('已经查到我订单了吗' in query):
                  formatted_answer = (
                      f'我这边其实已经记住订单 {display_order_no} 了，后面你可以直接继续问物流、退款或售后，不用每次都重新发。\n\n'
                      f'当前商品：{items_text}\n'
                      f'当前状态：{status}\n'
                      f'最新进度：{latest_progress}'
                  )
                  return {'formatted_answer': formatted_answer, 'order_no': order_no}

              if any(kw in query for kw in ['退款到哪一步了', '退款到哪一步', '退款进度', '审核到哪了', '到账了吗', '退款审核通过了吗']):
                  formatted_answer = (
                      f'我继续帮你看这个订单 {display_order_no} 的退款进度。\n\n'
                      f'当前状态：{status}\n'
                      f'退款状态：{refund_status}\n'
                      f'最新进度：{latest_progress}'
                  )
                  return {'formatted_answer': formatted_answer, 'order_no': order_no}

              if any(kw in query for kw in ['型号', '商品', '商品名', '这个商品', '这个订单商品', '这款', '这个杯子']):
                  formatted_answer = (
                      f'我这边能看到这单商品是：{items_text}。\n\n'
                      f'订单状态：{status}\n'
                      f'如果你是想问安装说明、使用方法或质保，我也可以继续按这个商品帮你看。'
                  )
                  return {'formatted_answer': formatted_answer, 'order_no': order_no}

              if any(kw in query for kw in ['什么时候到', '多久到', '到哪了', '到了吗', '我的货在哪里', '我的货到哪了', '我的货到了没有', '我的货到了没', '我的货物在哪里', '我的货物到哪了', '我的货物到了没有', '我的货物到了没', '货到了没有', '货到了没', '货物到了没有', '货物到了没', '到货了吗', '快递到哪了', '物流到哪了']):
                  formatted_answer = (
                      f'我继续帮你看这个订单 {display_order_no} 的物流情况。\n\n'
                      f'当前状态：{status}\n'
                      f'物流公司：{carrier}\n'
                      f'物流单号：{tracking_no}\n'
                      f'最新进度：{latest_progress}'
                  )
                  return {'formatted_answer': formatted_answer, 'order_no': order_no}

              formatted_answer = (
                  f'我帮你查到订单 {display_order_no} 了。\n\n'
                  f'当前状态：{status}\n'
                  f'商品：{items_text}\n'
                  f'物流公司：{carrier}\n'
                  f'物流单号：{tracking_no}\n'
                  f'退款状态：{refund_status}\n'
