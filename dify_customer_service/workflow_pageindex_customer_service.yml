        desc: 使用 DeepSeek 对文档问题进行语义场景分类
        memory:
          enabled: false
          window:
            enabled: false
            size: 10
        model:
          completion_params:
            temperature: 0
            max_tokens: 16
          mode: chat
          name: deepseek-chat
          provider: langgenius/deepseek/deepseek
        prompt_template:
        - role: system
          text: |-
            你是售后客服文档场景分类器。请根据用户问题，只输出一个小写标签，不要输出解释、标点或多余文本。可选标签只有：refund、logistics、warranty、usage、other。
            标签含义： refund：退货退款、售后规则、退款时效、是否能退 logistics：发货、物流进度、签收异常、破损、少件、漏发 warranty：质量问题、故障、维修、换新、保修、质保 usage：安装、使用、说明书、型号对应使用方法 other：以上都不属于，或信息不足
        - role: user
          text: |-
            最近一次文档场景：{{#conversation.last_doc_scene#}}
            用户问题：{{#sys.query#}}
            只输出标签。
        retry_config:
          enabled: false
          exponential_backoff:
            enabled: false
            max_interval: 10000
            multiplier: 2
          max_retries: 1
          retry_interval: 1000
        selected: false
        structured_output:
          enabled: false
        title: 文档场景分类-DeepSeek
        type: llm
        variables: []
        vision:
          configs:
            variable_selector: []
          enabled: false
      height: 90
      id: route_doc_scene_llm
      position:
        x: 1260
        y: 180
      positionAbsolute:
        x: 1260
        y: 180
