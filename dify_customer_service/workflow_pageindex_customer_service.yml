    - data: &pageindex_http
        authorization:
          config: null
          type: no-auth
        body:
          data:
          - key: ''
            type: text
            value: '{}'
          type: json
        desc: ''
        headers: 'Content-Type:application/json'
        method: post
        params: ''
        retry_config:
          retry_enabled: false
          max_retries: 1
          retry_interval: 1000
        ssl_verify: true
        timeout:
          connect: 10
          read: 30
          write: 30
        title: PageIndex检索-退换货
        body:
          type: json
          data:
          - key: ''
            type: text
            value: '{"q":"{{#build_query_refund.text#}}","top_k":5,"scene":"refund"}'
        type: http-request
        url: http://pageindex_official:8790/search
