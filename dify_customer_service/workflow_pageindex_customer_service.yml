app:
  description: After-sales customer service workflow with LLM routing, PageIndex docs search, and order API lookup.
  icon: "🤖"
  icon_background: '#EFF1F5'
  mode: advanced-chat
  name: 售后客服-PageIndex版-v3
  use_icon_as_answer_icon: false
dependencies: []
kind: app
version: 0.3.1
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      enabled: false
    opening_statement: '你好，我是售后助手。你可以问售后规则、物流、质保、安装使用，或者查询订单。'
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    edges:
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: start
        targetType: llm
      id: start-route-llm
      source: start
      sourceHandle: source
      target: route_l1_llm
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: llm
        targetType: if-else
      id: route-llm-if
      source: route_l1_llm
      sourceHandle: source
      target: route_l1_if
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: if-else
        targetType: code
      id: l1-order
      source: route_l1_if
      sourceHandle: order
      target: extract_order_params
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: code
        targetType: http-request
      id: order-extract-query
      source: extract_order_params
      sourceHandle: source
      target: query_order_api
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: if-else
        targetType: llm
      id: l1-docs
      source: route_l1_if
      sourceHandle: docs
      target: route_doc_scene_llm
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: if-else
        targetType: code
      id: l1-fallback
      source: route_l1_if
      sourceHandle: 'false'
      target: fallback_prep
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: code
        targetType: llm
      id: fallback-prep-agent
      source: fallback_prep
      sourceHandle: source
      target: fallback_agent
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
