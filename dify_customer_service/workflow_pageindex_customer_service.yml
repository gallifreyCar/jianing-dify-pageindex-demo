          def main(query: str = '') -> dict:
              text = (query or '').strip()
              normalized = re.sub(r'\s+', '', text)
              if not normalized:
                  return {'hint': '空输入'}

              order_patterns = [r'\bJN\d{12}\b', r'\b[A-Z]{2}\d{8,}\b']
              service_keywords = ['订单', '退款', '退货', '物流', '快递', '签收', '质保', '保修', '维修', '安装', '使用', '说明书', '质量', '故障']

              if any(re.search(pattern, text, re.I) for pattern in order_patterns):
                  return {'hint': text}
              if any(keyword in text for keyword in service_keywords):
                  return {'hint': text}
              if len(normalized) <= 4 or re.fullmatch(r'[A-Za-z0-9\W_]+', normalized):
                  return {'hint': '无明确售后意图的短输入'}
              return {'hint': '信息不足的模糊输入'}
