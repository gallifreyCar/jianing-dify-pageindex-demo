    - data:
        isInIteration: false
        isInLoop: false
        sourceType: start
        targetType: llm
      id: start-route-llm
      source: start
      sourceHandle: source
      target: route_l1_llm
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: llm
        targetType: if-else
      id: route-llm-if
      source: route_l1_llm
      sourceHandle: source
      target: route_l1_if
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: if-else
        targetType: http-request
      id: l1-order
      source: route_l1_if
      sourceHandle: order
      target: query_order_api
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: if-else
        targetType: llm
      id: l1-docs
      source: route_l1_if
      sourceHandle: docs
      target: route_doc_scene_llm
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: if-else
        targetType: answer
      id: l1-fallback
      source: route_l1_if
      sourceHandle: false
      target: answer_fallback
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
