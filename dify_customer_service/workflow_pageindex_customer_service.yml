            size: 10
        model:
          completion_params:
            temperature: 0
          mode: chat
          name: deepseek-chat
          provider: langgenius/deepseek/deepseek
        prompt_config:
          jinja2_variables: []
        prompt_template:
        - role: system
          text: ''
        reasoning_format: tagged
        selected: false
        type: llm
        variables: []
        vision:
          enabled: false
        title: 一级分类-LLM
        prompt_template:
        - role: system
          text: '你是客服分类器。你的任务是把用户问题分成 order、docs、other 三类，只输出一个英文标签，不要解释。

order：查订单、物流单号、发货进度、退款进度、催发货、订单状态。
docs：售后规则、退货退款、物流签收、破损少件、质量问题、坏了、故障、异响、不能用、质保、换新、维修、安装、使用说明。
other：无法判断、闲聊、活动优惠、与售后和订单都无关。

像“质量不行”“东西坏了”“有质量问题”“不能用了”“怎么保修”这类问题，一律输出 warranty 所属的大类 docs，所以这里应输出 docs。

只输出：order 或 docs 或 other。'
        - role: user
          text: '用户问题：{{#sys.query#}}'
      height: 120
      id: route_l1_llm
      position:
        x: 340
        y: 240
      positionAbsolute:
        x: 340
        y: 240
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        cases:
        - case_id: order
          conditions:
          - comparison_operator: contains
            id: l1-order-cond
            value: order
            varType: string
            variable_selector:
            - route_l1_llm
            - text
          logical_operator: and
        - case_id: docs
          conditions:
          - comparison_operator: contains
            id: l1-docs-cond
            value: docs
            varType: string
            variable_selector:
            - route_l1_llm
            - text
          logical_operator: and
        desc: ''
        selected: false
        title: 一级分支
        type: if-else
      height: 150
      id: route_l1_if
      position:
        x: 650
        y: 240
      positionAbsolute:
        x: 650
        y: 240
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        <<: *llm_base
        prompt_template:
        - role: system
          text: '你是售后文档场景分类器。只输出一个英文标签：refund、logistics、warranty、usage、other，不要解释。

refund：退货、退款、七天无理由、不想要了、退差价、退款多久到。
logistics：发货、催发货、快递、签收、破损、少件、漏发、物流不更新。
warranty：质量问题、质量不行、坏了、损坏、故障、异响、不能用、失灵、保修、质保、换新、维修。
usage：安装、使用方法、操作步骤、说明书、如何连接、如何开机、如何设置。
other：以上都不明显匹配。

如果用户在表达商品本身有问题，比如“质量不行”“坏了”“不能用”“有故障”，优先输出 warranty。

只输出：refund 或 logistics 或 warranty 或 usage 或 other。'
