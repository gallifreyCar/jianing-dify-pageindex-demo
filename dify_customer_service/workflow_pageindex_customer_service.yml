    nodes:
    - data:
        desc: 输入查单辅助信息
        selected: false
        title: 开始
        type: start
        variables:
        - label: 订单号
          max_length: 64
          options: []
          required: false
          type: text-input
          variable: order_no
        - label: 手机后4位
          max_length: 8
          options: []
          required: false
          type: text-input
          variable: phone_tail
      height: 120
      id: start
      position:
        x: 40
        y: 240
      positionAbsolute:
        x: 40
        y: 240
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data: &llm_base
        context:
          enabled: false
          variable_selector: []
        desc: ''
        memory:
          query_prompt_template: '{{#sys.query#}}

            {{#sys.files#}}'
          role_prefix:
            assistant: ''
            user: ''
          window:
            enabled: false
            size: 10
        model:
          completion_params:
            temperature: 0
          mode: chat
          name: deepseek-chat
          provider: langgenius/deepseek/deepseek
        prompt_config:
          jinja2_variables: []
        code: "import re\n\ndef main(query: str, order_no: str = '') -> dict:\n    text = (query or '').strip()\n    normalized = re.sub(r'\\s+', '', text)\n    if not normalized:\n        return {'text': 'other'}\n\n    order_patterns = [r'\\bJN\\d{12}\\b', r'\\b[A-Z]{2}\\d{8,}\\b']\n    if any(re.search(pattern, text, re.I) for pattern in order_patterns):\n        return {'text': 'order'}\n\n    order_keywords = ['查订单', '查询订单', '订单号', '订单状态', '退款进度', '催发货', '查一下订单', '帮我查订单', '物流单号', '订单到哪', '什么时候发货']\n    docs_keywords = ['售后', '退货', '退款', '签收', '破损', '少件', '漏发', '质量', '坏了', '故障', '异响', '不能用', '失灵', '质保', '保修', '换新', '维修', '安装', '使用说明', '说明书', '怎么用', '怎么安装']\n\n    if any(keyword in text for keyword in order_keywords):\n        return {'text': 'order'}\n    if any(keyword in text for keyword in docs_keywords):\n        return {'text': 'docs'}\n    if '物流' in text or '快递' in text:\n        if any(keyword in text for keyword in ['破损', '少件', '漏发', '签收异常', '不更新']):\n            return {'text': 'docs'}\n        return {'text': 'order'}\n\n    # For short or ambiguous inputs, prefer clarification instead of risky routing.\n    if len(normalized) <= 4:\n        return {'text': 'other'}\n\n    if re.fullmatch(r'[A-Za-z0-9\\-_/]+', normalized):\n        return {'text': 'other'}\n\n    return {'text': 'other'}\n"
        code_language: python3
        desc: ''
        outputs:
          text:
            children: null
            type: string
        selected: false
        title: 一级分类-规则
        type: code
        variables:
        - value_selector:
          - sys
          - query
          value_type: string
          variable: query
      height: 100
      id: route_l1_llm
      position:
        x: 340
        y: 240
