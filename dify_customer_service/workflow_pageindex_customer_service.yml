        desc: ''
        selected: false
        title: 一级分支
        type: if-else
      height: 150
      id: route_l1_if
      position:
        x: 650
        y: 300
      positionAbsolute:
        x: 650
        y: 300
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        code: |
          def main(query: str, last_doc_scene: str = 'other') -> dict:
              text = (query or '').strip()
              normalized = ''.join(text.split())
              last_doc_scene = (last_doc_scene or 'other').strip()
              if not text:
                  return {'text': 'other'}

              refund_keywords = ['退货', '退款', '七天无理由', '不想要', '退差价', '退款多久', '退钱', '订单退款', '能退款', '能退吗', '可以退款', '可以退吗', '售后规则', '售后规则呢', '规则呢', '多久到账']
              logistics_keywords = ['发货', '催发货', '快递', '签收', '破损', '少件', '漏发', '物流', '不更新', '什么时候到', '多久到', '到哪了']
              warranty_keywords = ['质量', '坏了', '损坏', '故障', '异响', '不能用', '失灵', '保修', '质保', '换新', '维修', '杯子坏了', '能换新吗', '能修吗', '保修多久', '质保多久', '返修', '修理']
              usage_keywords = ['安装', '使用', '说明书', '怎么用', '如何连接', '如何开机', '如何设置', '教程', '步骤', '安装说明', '型号', '怎么装', '安装步骤', '装不上', '不会装', '连不上']
              generic_followups = ['这个', '那这个', '那怎么', '怎么办', '怎么处理', '然后呢', '那呢', '那这个呢', '这个呢']

              if any(keyword in text for keyword in warranty_keywords):
                  return {'text': 'warranty'}
              if any(keyword in text for keyword in refund_keywords):
                  return {'text': 'refund'}
              if any(keyword in text for keyword in logistics_keywords):
                  return {'text': 'logistics'}
              if any(keyword in text for keyword in usage_keywords):
                  return {'text': 'usage'}

              if last_doc_scene in ['refund', 'logistics', 'warranty', 'usage']:
                  if len(normalized) <= 10 and any(keyword in text for keyword in generic_followups):
                      return {'text': last_doc_scene}
                  if len(normalized) <= 8 and normalized.endswith('呢'):
                      return {'text': last_doc_scene}

              return {'text': 'other'}
        code_language: python3
        desc: ''
        outputs:
          text:
            children: 
            type: string
