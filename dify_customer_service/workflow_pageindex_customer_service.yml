    - data:
        code: |
          import re

          def main(query: str = '', start_order_no: str = '', start_phone_tail: str = '', remembered_order_no: str = '') -> dict:
              text = (query or '').strip()
              order_no = (start_order_no or '').strip()
              phone_tail = (start_phone_tail or '').strip()
              remembered_order_no = (remembered_order_no or '').strip()

              if not order_no:
                  patterns = [r'\bJN\d{12}\b', r'\b[A-Z]{2}\d{8,}\b']
                  for pattern in patterns:
                      match = re.search(pattern, text, re.I)
                      if match:
                          order_no = match.group(0).upper()
                          break

              if not order_no and remembered_order_no:
                  if any(keyword in text for keyword in ['订单', '快递', '物流', '退款', '退货', '发货', '到哪', '到了吗', '什么时候到', '多久到', '货', '货物', '到货']):
                      order_no = remembered_order_no

              if not phone_tail:
                  phone_patterns = [
                      r'(?:尾号|手机尾号|手机号后?4位|后四位)[^\d]*(\d{4})',
                      r'\b(\d{4})\b',
                  ]
                  for pattern in phone_patterns:
                      match = re.search(pattern, text)
                      if match:
                          phone_tail = match.group(1)
                          break

              return {
                  'order_no': order_no,
                  'phone_tail': phone_tail,
              }
