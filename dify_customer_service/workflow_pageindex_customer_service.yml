      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        code: |
          def main(llm_text: str = '', rule_text: str = 'other') -> dict:
              valid_labels = ['refund', 'logistics', 'warranty', 'usage', 'other']
              raw = (llm_text or '').strip().lower()
              rule_text = (rule_text or 'other').strip().lower()

              label = 'other'
              for item in valid_labels:
                  if raw == item or item in raw:
                      label = item
                      break

              if label in ['refund', 'logistics', 'warranty', 'usage']:
                  return {'text': label}
              if rule_text in ['refund', 'logistics', 'warranty', 'usage']:
                  return {'text': rule_text}
              return {'text': 'other'}
        code_language: python3
        desc: ''
        outputs:
