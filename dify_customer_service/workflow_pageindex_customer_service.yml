    - data:
        code: |
          import json

          SCENE_SUFFIX = {
              'refund': '如需我继续帮你判断是否符合退换条件，也可以把订单号发我。',
              'logistics': '如果你方便，也可以继续把订单号或异常情况发我，我帮你往下看。',
              'warranty': '如果你愿意，我也可以继续帮你判断是走换新、维修还是质保。',
              'usage': '如果你现在方便，也可以把具体型号或报错现象发我，我继续帮你排查。',
              'other': '如果这个问题还没解决，你也可以补充订单号、照片或更具体的现象，我继续帮你处理。',
          }

          def main(response_json: str, scene: str = 'other') -> dict:
              scene = (scene or 'other').strip()
              suffix = SCENE_SUFFIX.get(scene, SCENE_SUFFIX['other'])
              try:
                  body = json.loads(response_json or '{}')
              except Exception:
                  return {'answer': (response_json or '暂时没有整理出可直接展示的答案，你可以换个更具体的问法继续问我。') + '\n\n' + suffix}

              answer = (body.get('answer') or '').strip()
              if answer:
                  return {'answer': answer + '\n\n' + suffix}

              hits = body.get('hits') or []
              snippets = []
              for hit in hits[:3]:
                  title = (hit.get('title') or '').strip()
                  text = (hit.get('text') or hit.get('summary') or '').strip().replace('## ', '')
                  snippet = f'{title}：{text[:120]}'.strip('：')
                  if snippet:
                      snippets.append(snippet)

              if snippets:
                  return {'answer': '我先帮你找到这些相关内容：\n' + '\n'.join(f'- {s}' for s in snippets) + '\n\n' + suffix}

              return {'answer': '暂时没有整理出可直接展示的答案，你可以换个更具体的问法继续问我。\n\n' + suffix}
