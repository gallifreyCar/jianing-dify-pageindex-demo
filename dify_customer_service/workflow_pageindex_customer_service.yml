app:
  description: After-sales customer service workflow with LLM routing, PageIndex docs search, and order API lookup.
  icon: "🤖"
  icon_background: '#EFF1F5'
  mode: advanced-chat
  name: 售后客服-PageIndex版-v3
  use_icon_as_answer_icon: false
dependencies: []
kind: app
version: 0.3.1
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      enabled: false
    opening_statement: '你好，我是售后助手。你可以问售后规则、物流、质保、安装使用，或者查询订单。'
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    edges:
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: start
        targetType: llm
      id: start-route-llm
      source: start
      sourceHandle: source
      target: route_l1_llm
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: llm
        targetType: if-else
      id: route-llm-if
      source: route_l1_llm
      sourceHandle: source
      target: route_l1_if
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: if-else
        targetType: http-request
      id: l1-order
      source: route_l1_if
      sourceHandle: order
      target: query_order_api
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: if-else
        targetType: llm
      id: l1-docs
      source: route_l1_if
      sourceHandle: docs
      target: route_doc_scene_llm
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: if-else
        targetType: answer
      id: l1-fallback
      source: route_l1_if
      sourceHandle: false
      target: answer_fallback
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: llm
        targetType: if-else
      id: docs-llm-if
      source: route_doc_scene_llm
      sourceHandle: source
      target: route_doc_scene_if
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: if-else
        targetType: llm
      id: docs-refund
      source: route_doc_scene_if
      sourceHandle: refund
      target: build_query_refund
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: if-else
        targetType: llm
      id: docs-logistics
      source: route_doc_scene_if
      sourceHandle: logistics
      target: build_query_logistics
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: if-else
        targetType: llm
      id: docs-warranty
      source: route_doc_scene_if
      sourceHandle: warranty
      target: build_query_warranty
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: if-else
        targetType: llm
      id: docs-usage
      source: route_doc_scene_if
      sourceHandle: usage
      target: build_query_usage
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: if-else
        targetType: llm
      id: docs-other
      source: route_doc_scene_if
      sourceHandle: false
      target: build_query_other
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: llm
        targetType: http-request
      id: refund-http
      source: build_query_refund
      sourceHandle: source
      target: search_pageindex_refund
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: llm
        targetType: http-request
      id: logistics-http
      source: build_query_logistics
      sourceHandle: source
      target: search_pageindex_logistics
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: llm
        targetType: http-request
      id: warranty-http
      source: build_query_warranty
      sourceHandle: source
      target: search_pageindex_warranty
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: llm
        targetType: http-request
      id: usage-http
      source: build_query_usage
      sourceHandle: source
      target: search_pageindex_usage
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: llm
        targetType: http-request
      id: other-http
      source: build_query_other
      sourceHandle: source
      target: search_pageindex_other
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: http-request
        targetType: answer
      id: refund-answer
      source: search_pageindex_refund
      sourceHandle: source
      target: answer_doc_refund
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: http-request
        targetType: answer
      id: logistics-answer
      source: search_pageindex_logistics
      sourceHandle: source
      target: answer_doc_logistics
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: http-request
        targetType: answer
      id: warranty-answer
      source: search_pageindex_warranty
      sourceHandle: source
      target: answer_doc_warranty
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: http-request
        targetType: answer
      id: usage-answer
      source: search_pageindex_usage
      sourceHandle: source
      target: answer_doc_usage
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: http-request
        targetType: answer
      id: other-answer
      source: search_pageindex_other
      sourceHandle: source
      target: answer_doc_other
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: http-request
        targetType: answer
      id: order-answer
      source: query_order_api
      sourceHandle: source
      target: answer_order
      targetHandle: target
      type: custom
      zIndex: 0
    nodes:
    - data:
        desc: 输入用户问题和订单信息
        selected: false
        title: 开始
        type: start
        variables:
        - label: 用户问题
          max_length: 3000
          options: []
          required: true
          type: paragraph
          variable: user_query
        - label: 订单号
          max_length: 64
          options: []
          required: false
          type: text-input
          variable: order_no
        - label: 手机后4位
          max_length: 8
          options: []
          required: false
          type: text-input
          variable: phone_tail
      height: 120
      id: start
      position:
        x: 40
        y: 240
      positionAbsolute:
        x: 40
        y: 240
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data: &llm_base
        context:
          enabled: false
          variable_selector: []
        desc: ''
        memory:
          query_prompt_template: '{{#sys.query#}}

            {{#sys.files#}}'
          role_prefix:
            assistant: ''
            user: ''
          window:
            enabled: false
            size: 10
        model:
          completion_params:
            temperature: 0
          mode: chat
          name: gpt-4o-mini
          provider: langgenius/openai/openai
        prompt_config:
          jinja2_variables: []
        prompt_template:
        - role: system
          text: ''
        reasoning_format: tagged
        selected: false
        type: llm
        variables: []
        vision:
          enabled: false
        title: 一级分类-LLM
        prompt_template:
        - role: system
          text: '你是客服分类器。只输出一个英文标签：order、docs、other。'
        - role: user
          text: '用户问题：{{#start.user_query#}}'
      height: 120
      id: route_l1_llm
      position:
        x: 340
        y: 240
      positionAbsolute:
        x: 340
        y: 240
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        cases:
        - case_id: order
          conditions:
          - comparison_operator: contains
            id: l1-order-cond
            value: order
            varType: string
            variable_selector:
            - route_l1_llm
            - text
          logical_operator: and
        - case_id: docs
          conditions:
          - comparison_operator: contains
            id: l1-docs-cond
            value: docs
            varType: string
            variable_selector:
            - route_l1_llm
            - text
          logical_operator: and
        desc: ''
        selected: false
        title: 一级分支
        type: if-else
      height: 150
      id: route_l1_if
      position:
        x: 650
        y: 240
      positionAbsolute:
        x: 650
        y: 240
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        <<: *llm_base
        prompt_template:
        - role: system
          text: '你是售后文档场景分类器。只输出一个英文标签：refund、logistics、warranty、usage、other。'
        - role: user
          text: '用户问题：{{#start.user_query#}}'
        title: 文档场景分类-LLM
      height: 120
      id: route_doc_scene_llm
      position:
        x: 960
        y: 240
      positionAbsolute:
        x: 960
        y: 240
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        cases:
        - case_id: refund
          conditions:
          - comparison_operator: contains
            id: doc-refund-cond
            value: refund
            varType: string
            variable_selector:
            - route_doc_scene_llm
            - text
          logical_operator: and
        - case_id: logistics
          conditions:
          - comparison_operator: contains
            id: doc-logistics-cond
            value: logistics
            varType: string
            variable_selector:
            - route_doc_scene_llm
            - text
          logical_operator: and
        - case_id: warranty
          conditions:
          - comparison_operator: contains
            id: doc-warranty-cond
            value: warranty
            varType: string
            variable_selector:
            - route_doc_scene_llm
            - text
          logical_operator: and
        - case_id: usage
          conditions:
          - comparison_operator: contains
            id: doc-usage-cond
            value: usage
            varType: string
            variable_selector:
            - route_doc_scene_llm
            - text
          logical_operator: and
        desc: ''
        selected: false
        title: 文档场景分支
        type: if-else
      height: 240
      id: route_doc_scene_if
      position:
        x: 1270
        y: 240
      positionAbsolute:
        x: 1270
        y: 240
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        <<: *llm_base
        prompt_template:
        - role: system
          text: '你是检索改写器。只输出一条用于搜索的短 query。'
        - role: user
          text: '场景: 退换货。用户问题: {{#start.user_query#}}'
