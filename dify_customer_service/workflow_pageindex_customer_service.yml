app:
  description: After-sales customer service workflow with LLM routing, PageIndex docs search, and order API lookup.
  icon: "🤖"
  icon_background: '#EFF1F5'
  mode: advanced-chat
  name: 售后客服-PageIndex版-v3
  use_icon_as_answer_icon: false
dependencies: []
kind: app
version: 0.3.1
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      enabled: false
    opening_statement: '你好，我是售后助手。你可以问售后规则、物流、质保、安装使用，或者查询订单。'
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
