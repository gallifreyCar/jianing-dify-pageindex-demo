      width: 244
    - data:
        code: "def main(query: str) -> dict:\n    text = (query or '').strip()\n    if not text:\n        return {'text': 'other'}\n\n    refund_keywords = ['退货', '退款', '七天无理由', '不想要', '退差价', '退款多久', '退钱']\n    logistics_keywords = ['发货', '催发货', '快递', '签收', '破损', '少件', '漏发', '物流', '不更新']\n    warranty_keywords = ['质量', '坏了', '损坏', '故障', '异响', '不能用', '失灵', '保修', '质保', '换新', '维修']\n    usage_keywords = ['安装', '使用', '说明书', '怎么用', '如何连接', '如何开机', '如何设置', '教程', '步骤']\n\n    if any(keyword in text for keyword in warranty_keywords):\n        return {'text': 'warranty'}\n    if any(keyword in text for keyword in refund_keywords):\n        return {'text': 'refund'}\n    if any(keyword in text for keyword in logistics_keywords):\n        return {'text': 'logistics'}\n    if any(keyword in text for keyword in usage_keywords):\n        return {'text': 'usage'}\n\n    return {'text': 'other'}\n"
        code_language: python3
        desc: ''
