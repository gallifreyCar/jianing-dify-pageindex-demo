    - data:
        desc: ''
        selected: false
        title: 开始
        type: start
        variables:
        - label: 订单号（可选）
          max_length: 64
          options: []
          required: false
          type: text-input
          variable: order_no
      height: 100
      id: start
      position:
        x: 40
        y: 300
      positionAbsolute:
        x: 40
        y: 300
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        code: |
          import re
          import json

          def main(query: str, start_order_no: str = '',
                   mem_order_no: str = '', mem_order_detail: str = '', mem_product: str = '') -> dict:
              text = (query or '').strip()

              # 提取订单号
              order_no = (start_order_no or '').strip()
              if not order_no:
                  patterns = [r'\bJN\d{12}\b', r'\b[A-Z]{2}\d{8,}\b']
                  for p in patterns:
                      m = re.search(p, text, re.I)
                      if m:
                          order_no = m.group(0).upper()
                          break

              # 使用记忆的订单号
              if not order_no and mem_order_no:
                  order_no = mem_order_no

              # 解析订单详情
              order_detail = {}
              if mem_order_detail:
                  try:
                      order_detail = json.loads(mem_order_detail)
                  except:
                      pass

              # 商品
              product = mem_product or (order_detail.get('items', [''])[0] if order_detail else '')

              return {
                  'order_no': order_no,
                  'has_order_context': bool(order_detail),
                  'product': product,
              }
        code_language: python3
        desc: 提取槽位信息
        outputs:
          order_no:
            children:
            type: string
          has_order_context:
            children:
            type: boolean
          product:
            children:
            type: string
