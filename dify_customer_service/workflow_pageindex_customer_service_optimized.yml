                  data = json.loads(response)
              except:
                  data = {}

              answer = data.get('answer', '')
              hits = data.get('hits', [])

              return {
                  'answer': answer,
                  'hits_json': json.dumps(hits[:3], ensure_ascii=False),
                  'has_answer': bool(answer),
              }
