    - data:
        code: |
          import json

          def main(llm_output: str, order_no: str = '') -> dict:
              try:
                  result = json.loads(llm_output)
              except:
                  result = {'intent': 'chat', 'scene': 'other', 'confidence': 0.5}

              intent = result.get('intent', 'chat')
              scene = result.get('scene', 'other')
              confidence = result.get('confidence', 0.5)

              # 路由判断
              route = 'chat'
              if intent == 'order' and order_no:
                  route = 'order'
              elif intent == 'docs':
                  route = 'docs'
              elif intent == 'order' and not order_no:
                  route = 'chat'  # 没订单号走chat引导

              if confidence < 0.5:
                  route = 'chat'

              return {
                  'intent': intent,
                  'scene': scene,
                  'confidence': confidence,
                  'route': route,
              }
        code_language: python3
        desc: 解析意图结果
